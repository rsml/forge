# Forge-managed tmux config — do not load user config
set-option -g status off
set-option -g default-terminal "xterm-256color"
set-option -g history-limit 50000
set-option -g fill-character " "

# Idle detection: flag windows with no output for 2 seconds.
# Forge subscribes to window_silence_flag for push-based attention dots.
# Dot appears ~2s after output stops. Clears after sustained activity (2s + poll cycle).
set-option -gw monitor-silence 2
# Suppress tmux's own alert actions — Forge handles attention via the subscription.
set-option -g silence-action none
set-option -g activity-action none

# Size windows to the largest client so the control mode client (1x1) never
# constrains the terminal view. Resize active window whenever a client changes
# size (window resize, app launch layout settle).
set-option -g window-size largest
set-hook -g client-resized 'resize-window -A'

# TUI app compatibility for tmux control mode (-CC).
# Fullscreen/alternate-screen TUI rendering is incompatible with control mode
# (the renderer is a proxy, not the direct PTY owner). These env vars force
# TUI apps to use classic scrollback rendering instead.
set-option -ga update-environment "CLAUDE_CODE_DISABLE_ALTERNATE_SCREEN"
set-environment -g CLAUDE_CODE_DISABLE_ALTERNATE_SCREEN 1

# Synchronized output support — reduces flickering for apps that use DECSET 2026.
set-option -as terminal-features ',*:sync'

# Allow passthrough for OSC sequences (clipboard, notifications).
set-option -g allow-passthrough on
