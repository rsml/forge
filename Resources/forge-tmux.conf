# Forge-managed tmux config — do not load user config
set-option -g status off
set-option -g default-terminal "xterm-256color"
set-option -g history-limit 50000
set-option -g fill-character " "

# Idle detection: flag windows with no output for 3 seconds.
# Forge subscribes to window_silence_flag for push-based attention dots.
set-option -gw monitor-silence 3

# Size windows to the largest client so the control mode client (1x1) never
# constrains the terminal view. Resize active window whenever a client changes
# size (window resize, app launch layout settle).
set-option -g window-size largest
set-hook -g client-resized 'resize-window -A'
